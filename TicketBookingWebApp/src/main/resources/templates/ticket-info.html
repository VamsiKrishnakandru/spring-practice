<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ticket Details</title>
</head>
<body>
<h1>Ticket Details</h1>
	<table>
		<tr>
			<td>Ticket Number:</td>
			<td><p th:text="${ticket.ticketNumber}"></p></td>
		</tr>
		<tr>
			<td>Ticket Price:</td>
			<td><p th:text="${ticket.ticketPrice}"></p></td>
		</tr>
		<tr>
			<td>Passenger Name:</td>
			<td><p th:text="${ticket.name}"></p></td>
		</tr>
		<tr>
			<td>Passenger Departure:</td>
			<td><p th:text="${ticket.departure}"></p></td>
		</tr>
		<tr>
			<td>Passenger Arrival:</td>
			<td><p th:text="${ticket.arrival}"></p></td>
		</tr>
		<tr>
			<td>Date of Journey:</td>
			<td><p th:text="${ticket.dateOfJourney}"></p></td>
		</tr>
		<tr>
			<td>Ticket status:</td>
			<td><p th:text="${ticket.status}"></p></td>
		</tr>
	</table>
</body>
</html>
